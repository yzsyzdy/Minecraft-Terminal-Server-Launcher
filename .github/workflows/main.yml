name: Build and Sign

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 赋予创建 Release 的写权限
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install nuitka
          pip install imageio

      # ---------- 构建（改为单行，避免续行符解析错误）----------
      - name: Build with Nuitka
        run: python -m nuitka --standalone --assume-yes-for-downloads --enable-plugin=anti-bloat --windows-console-mode=force --windows-icon-from-ico=icon.png --output-dir=build --product-name=MSTL --file-description="Minecraft Terminal Server Launcher" --product-version="1.0.0" --file-version="1.0.0" --copyright="MSTL" --include-data-dir=locals=locals start.py

      # ---------- 查看构建产物（调试）----------
      - name: List output directory
        run: Get-ChildItem -Recurse build

      # ---------- 压缩整个输出目录 ----------
      - name: Compress build output
        shell: powershell
        run: |
          $source = "build/start.dist"
          $zipFile = "MSTL-unsigned.zip"
          if (-not (Test-Path $source)) {
            Write-Host "Directory $source not found, trying build/start.exe (single file)..."
            $source = "build/start.exe"
          }
          Compress-Archive -Path $source -DestinationPath $zipFile -Force
          Write-Host "Created $zipFile"

      # ---------- 上传压缩包到工件（临时保存）----------
      - name: Upload unsigned artifact
        uses: actions/upload-artifact@v4
        with:
          name: MSTL-unsigned
          path: MSTL-unsigned.zip

      # ---------- 自动发布到 Releases ----------
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: MSTL-unsigned.zip
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
